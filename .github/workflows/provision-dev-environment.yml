on:
  workflow_dispatch:
    inputs:
      port_context:
        required: true
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Log received inputs
        run: |
          echo "🚀 Service: ${{ fromJson(inputs.port_context).service }}"
          echo "📍 Cluster: ${{ fromJson(inputs.port_context).target_cluster }}"
          echo "⚙️  Profile: ${{ fromJson(inputs.port_context).profile }}"
          echo "⏱  TTL: ${{ fromJson(inputs.port_context).ttl }}"

      - name: Simulate Snyk security scan
        run: |
          echo "🛡 Running Snyk container scan..."
          sleep 3
          echo "✅ No critical vulnerabilities found"

      - name: Simulate Terraform namespace creation
        run: |
          echo "🏗 Running terraform apply..."
          sleep 5
          echo "✅ Namespace wmt-${{ fromJson(inputs.port_context).service }}-dev created"
          echo "✅ RBAC roles applied"
          echo "✅ Resource quotas configured"

      - name: Simulate ArgoCD sync
        run: |
          echo "🚀 ArgoCD syncing to cluster..."
          sleep 4
          echo "✅ Namespace active on cluster"

      - name: Simulate Datadog dashboard creation
        run: |
          echo "📊 Cloning monitoring template..."
          sleep 2
          echo "✅ Dashboard created"

      - name: Create environment entity in Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          identifier: "wmt-${{ fromJson(inputs.port_context).service }}-dev"
          blueprint: environment
          properties: |
            {
              "type": "${{ fromJson(inputs.port_context).environment_type }}",
              "status": "active",
              "namespace": "wmt-${{ fromJson(inputs.port_context).service }}-dev",
              "resource_profile": "${{ fromJson(inputs.port_context).profile }}",
              "expiry": "${{ fromJson(inputs.port_context).ttl }}"
            }

      - name: Mark Port action run as SUCCESS
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: SUCCESS
          logMessage: "✅ Dev environment wmt-${{ fromJson(inputs.port_context).service }}-dev provisioned successfully"

